<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumer Dashboard - RenewX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/dashboard.js"></script>
    <script>
        // Immediate Auth Check
        if (!window.RenewX.checkAuth('consumer')) {
            // Redirect happens inside checkAuth
        }
    </script>
</head>

<body class="overflow-hidden flex h-screen bg-black">
    <!-- Sidebar -->
    <aside class="w-80 glass-premium m-6 rounded-[32px] flex flex-col p-8 custom-scrollbar border border-white/5">
        <a href="index.html" class="flex items-center space-x-3 mb-12">
            <button class="uiverse" style="width: 32px; height: 32px; font-size: 16px;">
                <div class="wrapper">
                    <span>R</span>
                    <div class="circle circle-12" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-11" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-10" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-9" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-8" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-7" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-6" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-5" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-4" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-3" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-2" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-1" style="width: 15px; height: 15px;"></div>
                </div>
            </button>
            <span class="text-xl font-black text-white">RenewX</span>
        </a>

        <div class="space-y-2 flex-1">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-4">Menu</p>
            <a href="consumer.html"
                class="flex items-center space-x-4 px-5 py-4 bg-amber-600 text-white rounded-2xl font-black shadow-lg shadow-amber-900/40">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="#"
                class="flex items-center space-x-4 px-5 py-4 text-slate-400 hover:bg-white/5 rounded-2xl font-black transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <span>Browse Energy</span>
            </a>
        </div>

        <button onclick="window.RenewX.logout()"
            class="flex items-center space-x-4 px-5 py-4 text-red-500 hover:bg-red-500/10 rounded-2xl font-black transition-all w-full text-left">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-12 custom-scrollbar">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-hero-gradient heading-glow">Consumer Dashboard</h1>
                <p class="text-slate-400 font-bold" id="welcomeText">Your green energy impact.</p>
            </div>
            <button onclick="document.getElementById('marketplace').scrollIntoView({behavior:'smooth'})"
                class="bg-amber-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-amber-900/40 hover:bg-amber-500 transition-all">Browse
                Listings</button>
        </header>

        <!-- Stats -->
        <div class="grid md:grid-cols-3 gap-8 mb-12 animate-entrance">
            <div class="glass-premium rounded-3xl p-8 border-b-4 border-amber-500">
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-2">Energy Purchased</p>
                <h3 class="text-4xl font-black text-white italic" id="statEnergy">0 kWh</h3>
            </div>
            <div class="glass-premium rounded-3xl p-8 border-b-4 border-blue-500">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2">CO₂ Saved</p>
                <h3 class="text-4xl font-black text-white italic" id="statCO2">0 kg</h3>
            </div>
            <div class="glass-premium rounded-3xl p-8 border-b-4 border-purple-500">
                <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-2">Total Spent</p>
                <h3 class="text-4xl font-black text-white italic" id="statSpent">₹0</h3>
            </div>
        </div>

        <!-- Marketplace -->
        <section id="marketplace" class="mb-12 animate-entrance" style="animation-delay: 0.2s;">
            <h2 class="text-2xl font-black mb-8 tracking-tight text-premium-orange letter-spacing-tight">Available
                Energy Sources</h2>
            <div id="listingsContainer" class="grid md:grid-cols-2 gap-6">
                <!-- Listings injected here -->
            </div>
        </section>

        <!-- Purchase History -->
        <section class="glass-premium rounded-[32px] p-10 animate-entrance" style="animation-delay: 0.3s;">
            <h2 class="text-2xl font-black mb-8 tracking-tight text-premium-orange letter-spacing-tight">Purchase
                History</h2>
            <div id="historyContainer" class="space-y-4">
                <!-- Purchases injected here -->
            </div>
        </section>

        <!-- BUY MODAL -->
        <div id="buyModal"
            class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
            <div class="glass-premium w-full max-w-lg rounded-[40px] p-10 border border-white/10">
                <h2 class="text-3xl font-black text-white mb-2">Confirm Purchase</h2>
                <p id="buyDetails" class="text-slate-400 font-bold mb-8">Buying Solar Energy from test@renewx.com</p>

                <form id="buyForm" class="space-y-6">
                    <input type="hidden" id="buyListingId">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Units
                            to Buy (kWh)</label>
                        <input type="number" id="buyUnits" required min="1"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white font-bold outline-none focus:border-amber-500 transition-all"
                            placeholder="50">
                        <p id="availableInfo" class="text-[10px] font-bold text-amber-500 mt-2 uppercase"></p>
                    </div>

                    <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                        <div class="flex justify-between mb-2">
                            <span class="text-slate-400 font-bold">Price per kWh:</span>
                            <span id="priceLabel" class="text-white font-black">₹0</span>
                        </div>
                        <div class="flex justify-between pt-4 border-t border-white/10">
                            <span class="text-white font-bold">Total Cost:</span>
                            <span id="totalCost" class="text-2xl font-black text-amber-500">₹0</span>
                        </div>
                    </div>

                    <div class="flex space-x-4 pt-4">
                        <button type="button" onclick="closeModal()"
                            class="flex-1 py-4 rounded-2xl font-black text-slate-400 hover:bg-white/5 transition-all">Cancel</button>
                        <button type="submit"
                            class="flex-1 bg-amber-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-amber-900/40 hover:bg-amber-500 transition-all">Confirm
                            & Pay</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
    <script>
        const user = window.RenewX.getCurrentUser();
        document.getElementById('welcomeText').innerText = `Logged in as: ${user.email}`;

        let activeListing = null;

        async function openBuyModal(listingId) {
            const listings = await window.RenewX.getListings();
            activeListing = listings.find(l => l._id === listingId);

            if (!activeListing) return;

            document.getElementById('buyListingId').value = activeListing._id;
            document.getElementById('buyDetails').innerText = `Buying ${activeListing.energyType} Energy from ${activeListing.producer?.email || 'Unknown'}`;
            document.getElementById('availableInfo').innerText = `${activeListing.unitsAvailable} kWh available`;
            document.getElementById('priceLabel').innerText = window.RenewX.formatCurrency(activeListing.pricePerUnit);
            document.getElementById('buyUnits').max = activeListing.unitsAvailable;
            document.getElementById('buyUnits').value = '';
            document.getElementById('totalCost').innerText = '₹0';

            document.getElementById('buyModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('buyModal').classList.add('hidden');
        }

        document.getElementById('buyUnits').addEventListener('input', (e) => {
            const units = parseInt(e.target.value) || 0;
            if (activeListing) {
                const total = units * activeListing.pricePerUnit;
                document.getElementById('totalCost').innerText = window.RenewX.formatCurrency(total);
            }
        });

        document.getElementById('buyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const units = parseInt(document.getElementById('buyUnits').value);

            const res = await window.RenewX.buyEnergy(activeListing._id, units);

            if (res.success) {
                alert(`Success! You bought ${units} kWh.`);
                closeModal();
                await renderDashboard();
            } else {
                alert(res.message || 'Error processing purchase.');
            }
        });

        async function renderDashboard() {
            const listings = await window.RenewX.getListings();
            const purchaseResult = await window.RenewX.getMyPurchases();
            const purchases = purchaseResult.purchases || [];

            // Render Marketplace
            const container = document.getElementById('listingsContainer');
            container.innerHTML = listings.length ? '' : '<p class="text-slate-500 font-bold p-6">No energy listings available right now.</p>';

            listings.forEach(l => {
                const div = document.createElement('div');
                div.className = 'glass-premium p-8 rounded-[32px] border border-white/5 flex flex-col justify-between';
                div.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <div class="h-12 w-12 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            ${l.unitsAvailable < 50 ? '<span class="bg-red-500/10 text-red-500 text-[10px] font-black px-3 py-1 rounded-full border border-red-500/20">LOW STOCK</span>' : ''}
                        </div>
                        <h3 class="text-xl font-black text-white mb-1">${l.energyType} Power</h3>
                        <p class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">${l.location} • By ${l.producer?.name || 'Unknown'}</p>
                    </div>
                    <div class="mt-4 flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-black text-slate-500 uppercase">Available Units</p>
                            <p class="text-2xl font-black text-white">${l.unitsAvailable} <span class="text-sm font-bold text-slate-500">kWh</span></p>
                        </div>
                        <button onclick="openBuyModal('${l._id}')" class="bg-amber-600 text-white px-6 py-3 rounded-xl font-black text-sm hover:bg-amber-500 transition-all">Buy for ${window.RenewX.formatCurrency(l.pricePerUnit)}</button>
                    </div>
                `;
                container.appendChild(div);
            });

            // Render History
            const historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = purchases.length ? '' : '<p class="text-slate-500 font-bold p-6">No purchases made yet.</p>';

            purchases.forEach(p => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-6 bg-white/5 rounded-2xl border border-white/10';
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="h-10 w-10 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
                        </div>
                        <div>
                            <p class="font-black text-white leading-none">${p.unitsBought} kWh ${p.energyType}</p>
                            <p class="text-xs font-bold text-slate-500 mt-1">From: ${p.producer?.name || 'Unknown'} • ${new Date(p.createdAt).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <p class="font-black text-white">-${window.RenewX.formatCurrency(p.totalAmount)}</p>
                `;
                historyContainer.appendChild(div);
            });

            // Update Stats
            const stats = purchaseResult.stats || { totalUnits: 0, totalSpent: 0, co2Saved: '0 kg' };

            document.getElementById('statEnergy').innerText = `${stats.totalUnits.toLocaleString()} kWh`;
            document.getElementById('statCO2').innerText = stats.co2Saved;
            document.getElementById('statSpent').innerText = window.RenewX.formatCurrency(stats.totalSpent);
        }

        renderDashboard();
    </script>
    <script src="js/main.js"></script>
</body>

</html>
