<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producer Dashboard - RenewX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/dashboard.js"></script>
    <script>
        // Immediate Auth Check
        if (!window.RenewX.checkAuth('producer')) {
            // Redirect happens inside checkAuth
        }
    </script>
</head>

<body class="overflow-hidden flex h-screen bg-black">
    <!-- Sidebar -->
    <aside class="w-80 glass-premium m-6 rounded-[32px] flex flex-col p-8 custom-scrollbar border border-white/5">
        <a href="index.html" class="flex items-center space-x-3 mb-12">
            <button class="uiverse" style="width: 32px; height: 32px; font-size: 16px;">
                <div class="wrapper">
                    <span>R</span>
                    <div class="circle circle-12" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-11" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-10" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-9" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-8" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-7" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-6" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-5" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-4" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-3" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-2" style="width: 15px; height: 15px;"></div>
                    <div class="circle circle-1" style="width: 15px; height: 15px;"></div>
                </div>
            </button>
            <span class="text-xl font-black text-white">RenewX</span>
        </a>

        <div class="space-y-2 flex-1">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-4">Menu</p>
            <a href="producer.html"
                class="flex items-center space-x-4 px-5 py-4 bg-amber-600 text-white rounded-2xl font-black shadow-lg shadow-amber-900/40">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                <span>Overview</span>
            </a>
            <a href="#listingsContainer"
                onclick="document.getElementById('listingsContainer').scrollIntoView({behavior:'smooth'})"
                class="flex items-center space-x-4 px-5 py-4 text-slate-400 hover:bg-white/5 rounded-2xl font-black transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span>My Energy</span>
            </a>
            <a href="#salesContainer"
                onclick="document.getElementById('salesContainer').scrollIntoView({behavior:'smooth'})"
                class="flex items-center space-x-4 px-5 py-4 text-slate-400 hover:bg-white/5 rounded-2xl font-black transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Earnings</span>
            </a>
        </div>

        <button onclick="window.RenewX.logout()"
            class="flex items-center space-x-4 px-5 py-4 text-red-500 hover:bg-red-500/10 rounded-2xl font-black transition-all w-full text-left">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-12 custom-scrollbar">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-hero-gradient heading-glow">Producer Dashboard</h1>
                <p class="text-slate-400 font-bold" id="welcomeText">Manage your clean energy output.</p>
            </div>
            <button onclick="openModal()"
                class="bg-amber-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-amber-900/40 hover:bg-amber-500 transition-all">Add
                Listing +</button>
        </header>

        <!-- Stats -->
        <div class="grid md:grid-cols-3 gap-8 mb-12 animate-entrance">
            <div class="glass-premium rounded-3xl p-8 border-b-4 border-amber-500">
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-2">Total Units Listed</p>
                <h3 class="text-4xl font-black text-white italic" id="statUnits">0 kWh</h3>
            </div>
            <div class="glass-premium rounded-3xl p-8 border-b-4 border-blue-500">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2">Potential Revenue</p>
                <h3 class="text-4xl font-black text-white italic" id="statRevenue">₹0</h3>
            </div>
            <div class="glass-premium rounded-3xl p-8 border-b-4 border-purple-500">
                <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-2">Total Earnings</p>
                <h3 class="text-4xl font-black text-white italic" id="statEarnings">₹0</h3>
            </div>
        </div>

        <!-- My Listings -->
        <section class="glass-premium rounded-[32px] p-10 mb-12 animate-entrance" style="animation-delay: 0.1s;">
            <h2 class="text-2xl font-black mb-8 tracking-tight text-premium-orange letter-spacing-tight">Your Energy
                Listings</h2>
            <div id="listingsContainer" class="grid md:grid-cols-2 gap-6">
                <!-- Listing instances will be injected here -->
            </div>
        </section>

        <!-- Recent Sales -->
        <section class="glass-premium rounded-[32px] p-10 animate-entrance" style="animation-delay: 0.2s;">
            <h2 class="text-2xl font-black mb-8 tracking-tight text-premium-orange letter-spacing-tight">Recent Sales
            </h2>
            <div id="salesContainer" class="space-y-4">
                <!-- Sales records will be injected here -->
            </div>
        </section>

        <!-- ADD/EDIT MODAL -->
        <div id="listingModal"
            class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
            <div class="glass-premium w-full max-w-lg rounded-[40px] p-10 border border-white/10">
                <h2 id="modalTitle" class="text-3xl font-black text-white mb-8">Add Energy Listing</h2>
                <form id="listingForm" class="space-y-6">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Energy
                            Type</label>
                        <select id="energyType"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white font-bold outline-none focus:border-amber-500 transition-all">
                            <option value="Solar">Solar</option>
                            <option value="Wind">Wind</option>
                            <option value="Biogas">Biogas</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label
                                class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Units
                                (kWh)</label>
                            <input type="number" id="units" required min="1"
                                class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white font-bold outline-none focus:border-amber-500 transition-all"
                                placeholder="500">
                        </div>
                        <div>
                            <label
                                class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Price
                                (₹/kWh)</label>
                            <input type="number" id="price" required min="1"
                                class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white font-bold outline-none focus:border-amber-500 transition-all"
                                placeholder="5">
                        </div>
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Location</label>
                        <input type="text" id="location" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white font-bold outline-none focus:border-amber-500 transition-all"
                            placeholder="Mumbai, MH">
                    </div>
                    <div class="flex space-x-4 pt-4">
                        <button type="button" onclick="closeModal()"
                            class="flex-1 py-4 rounded-2xl font-black text-slate-400 hover:bg-white/5 transition-all">Cancel</button>
                        <button type="submit"
                            class="flex-1 bg-amber-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-amber-900/40 hover:bg-amber-500 transition-all">Save
                            Listing</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
    <script>
        const user = window.RenewX.getCurrentUser();
        document.getElementById('welcomeText').innerText = `Logged in as: ${user.email}`;

        async function openModal(listingId = null) {
            const modal = document.getElementById('listingModal');
            const form = document.getElementById('listingForm');
            const title = document.getElementById('modalTitle');

            form.reset();
            document.getElementById('editId').value = '';
            title.innerText = 'Add Energy Listing';

            if (listingId) {
                const listings = await window.RenewX.getProducerListings();
                const listing = listings.find(l => l._id === listingId);
                if (listing) {
                    document.getElementById('editId').value = listing._id;
                    document.getElementById('energyType').value = listing.energyType;
                    document.getElementById('units').value = listing.unitsAvailable;
                    document.getElementById('price').value = listing.pricePerUnit;
                    document.getElementById('location').value = listing.location;
                    title.innerText = 'Edit Energy Listing';
                }
            }

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('listingModal').classList.add('hidden');
        }

        document.getElementById('listingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                energyType: document.getElementById('energyType').value,
                unitsAvailable: parseInt(document.getElementById('units').value),
                pricePerUnit: parseInt(document.getElementById('price').value),
                location: document.getElementById('location').value
            };

            let res;
            if (id) {
                res = await window.RenewX.updateListing(id, data);
            } else {
                res = await window.RenewX.addListing(data);
            }

            if (res.success) {
                closeModal();
                await renderDashboard();
            } else {
                alert(res.message || 'Error saving listing.');
            }
        });

        async function deleteListing(id) {
            if (confirm('Are you sure you want to delete this listing?')) {
                const res = await window.RenewX.deleteListing(id);
                if (res.success) {
                    await renderDashboard();
                } else {
                    alert(res.message || 'Error deleting listing.');
                }
            }
        }

        async function renderDashboard() {
            const listings = await window.RenewX.getProducerListings();
            const salesResult = await window.RenewX.getProducerSales();
            const sales = salesResult.sales || [];

            // Render Listings
            const container = document.getElementById('listingsContainer');
            container.innerHTML = listings.length ? '' : '<p class="text-slate-500 font-bold p-6">No active listings.</p>';

            listings.forEach(l => {
                const div = document.createElement('div');
                div.className = 'glass-premium p-8 rounded-[32px] border border-white/5 relative group';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="h-12 w-12 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="openModal('${l._id}')" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <button onclick="deleteListing('${l._id}')" class="p-2 hover:bg-red-500/10 rounded-lg text-slate-400 hover:text-red-500 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </div>
                    <h3 class="text-xl font-black text-white mb-1">${l.energyType} Energy</h3>
                    <p class="text-sm font-bold text-slate-400 mb-6">${l.location}</p>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Available</p>
                            <p class="text-2xl font-black text-white">${l.unitsAvailable} <span class="text-sm font-bold text-slate-500">kWh</span></p>
                        </div>
                        <p class="text-xl font-black text-amber-500">${window.RenewX.formatCurrency(l.pricePerUnit)}/kWh</p>
                    </div>
                `;
                container.appendChild(div);
            });

            // Render Sales
            const salesContainer = document.getElementById('salesContainer');
            salesContainer.innerHTML = sales.length ? '' : '<p class="text-slate-500 font-bold p-6">No sales recorded yet.</p>';

            sales.forEach(p => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-6 bg-white/5 rounded-2xl border border-white/10';
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="h-10 w-10 bg-green-500/10 rounded-xl flex items-center justify-center text-green-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg>
                        </div>
                        <div>
                            <p class="font-black text-white leading-none">${p.unitsBought} kWh Sold</p>
                            <p class="text-xs font-bold text-slate-500 mt-1">To: ${p.consumer?.email || 'Unknown'} • ${new Date(p.createdAt).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <p class="font-black text-amber-500">+${window.RenewX.formatCurrency(p.totalAmount)}</p>
                `;
                salesContainer.appendChild(div);
            });

            // Update Stats
            const totalUnits = listings.reduce((sum, l) => sum + l.unitsAvailable, 0);
            const potentialRev = listings.reduce((sum, l) => sum + (l.unitsAvailable * l.pricePerUnit), 0);
            const totalEarned = salesResult.stats?.totalEarned || 0;

            document.getElementById('statUnits').innerText = `${totalUnits.toLocaleString()} kWh`;
            document.getElementById('statRevenue').innerText = window.RenewX.formatCurrency(potentialRev);
            document.getElementById('statEarnings').innerText = window.RenewX.formatCurrency(totalEarned);
        }

        renderDashboard();
    </script>
    <script src="js/main.js"></script>
</body>

</html>
